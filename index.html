<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SuperDépanneurs Paris — Électricien Urgence 24h/24 | Devis Gratuit</title>
  <meta name="description" content="SuperDépanneurs — Électricien agréé à Paris. Intervention en moins d'1h, 24h/24 7j/7. Dépannage, rénovation, installation. Devis gratuit immédiat."/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Jaune solaire — accent principal */
      --sun:        #FFB800;
      --sun2:       #FFD234;
      --sun-light:  #FFF8E0;
      --sun-grad:   linear-gradient(135deg, #FF9500 0%, #FFD234 100%);
      --sun-grad-h: linear-gradient(135deg, #F08000 0%, #FFB800 100%);

      /* Navy profond — structure */
      --navy:  #0A1628;
      --navy2: #0F1F40;
      --navy3: #162850;

      /* Blanc teinté bleu — sections alternées */
      --white: #FFFFFF;
      --bg:    #F4F7FF;
      --bg2:   #EEF3FF;

      /* Texte */
      --text:   #0A1628;
      --text2:  #2D3F6B;
      --muted:  #7B8EBB;
      --border: #D8E3F5;

      /* Vert vif — badge dispo + avis vérifié uniquement */
      --green:      #16A34A;
      --green-neon: #22C55E;
      --green-bg:   #DCFCE7;

      /* Bleu accent secondaire */
      --blue:       #1A56DB;
      --blue-light: #EBF3FF;
      --blue-mid:   #DBEAFE;

      --shadow-sm: 0 1px 6px rgba(10,22,40,0.07);
      --shadow:    0 6px 28px rgba(10,22,40,0.10);
      --shadow-lg: 0 16px 56px rgba(10,22,40,0.15);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    img { max-width: 100%; height: auto; display: block; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── URGENCY BAR ── */
    .urgency-bar {
      background: var(--sun-grad); color: var(--navy);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .ub-hide-mobile { display: inline; }

    .ub-text {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ub-pulse {
      width: 8px; height: 8px;
      background: var(--navy);
      border-radius: 50%;
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }

    .ub-phone {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 2px solid rgba(0,0,0,0.25);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }
    .ub-phone:hover { border-color: #fff; }

    /* ── NAV ── */
    nav {
      background: var(--white);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 99;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--sun);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .logo-text { font-weight: 800; font-size: 1.05rem; color: var(--navy); letter-spacing: -0.02em; }
    .logo-text span { color: var(--sun); font-weight: 900; }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .nav-trust { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .nav-trust strong { color: #15803D; }

    .btn-call-nav {
      display: flex; align-items: center; gap: 7px;
      background: var(--sun-grad); color: var(--navy);
      padding: 9px 18px; border-radius: 8px;
      font-weight: 700; font-size: 0.88rem;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(232,168,0,0.28);
    }
    .btn-call-nav:hover { background: var(--sun-grad-h); color: var(--navy); transform: translateY(-1px); box-shadow: 0 5px 18px rgba(255,149,0,0.32); }

    /* ── HERO ── */
    .hero {
      background: var(--navy);
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 420px;
      min-height: 88vh;
      align-items: stretch;
      position: relative;
      overflow: hidden;
    }

    .hero-photo {
      position: absolute;
      inset: 0;
      background-image: url('./hero-van.jpg');
      background-size: cover;
      background-position: center 40%;
      z-index: 0;
    }

    .hero-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(10,18,40,0.92) 0%,
        rgba(10,18,40,0.80) 40%,
        rgba(10,18,40,0.45) 65%,
        rgba(10,18,40,0.15) 100%
      );
    }



    .hero-left {
      padding: 72px 6% 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(232,168,0,0.12);
      border: 1px solid rgba(232,168,0,0.28);
      color: #15803D;
      padding: 6px 14px; border-radius: 100px;
      font-size: 0.74rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 24px;
      width: fit-content;
    }

    .badge-dot { width: 6px; height: 6px; background: #22C55E; border-radius: 50%; animation: pulse 1.4s infinite; box-shadow: 0 0 0 3px rgba(34,197,94,0.35), 0 0 8px rgba(34,197,94,0.5); }

    h1 {
      font-size: clamp(2.4rem, 4.5vw, 3.6rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }

    h1 .red { color: var(--sun2); }
    h1 .block { display: block; }

    .hero-sub {
      font-size: 1.06rem;
      color: rgba(255,255,255,0.62);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 36px;
      font-weight: 400;
    }
    .hero-sub strong { color: rgba(255,255,255,0.9); font-weight: 600; }

    .hero-cta-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 36px; }

    .btn-hero-primary {
      display: inline-flex; align-items: center; gap: 9px;
      background: var(--sun-grad); color: var(--navy);
      padding: 16px 30px; border-radius: 10px;
      font-weight: 800; font-size: 1.05rem;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(232,168,0,0.35);
      animation: fadeUp 0.6s ease both;
    }
    .btn-hero-primary:hover { background: var(--sun-grad-h); color: var(--navy); transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,149,0,0.42); }

    .btn-hero-secondary {
      display: inline-flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      padding: 15px 26px; border-radius: 10px;
      font-weight: 600; font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.2s;
      animation: fadeUp 0.6s 0.08s ease both;
    }
    .btn-hero-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.35); color: #fff; }

    .hero-guarantees {
      display: flex; flex-wrap: wrap; gap: 18px;
      animation: fadeUp 0.6s 0.16s ease both;
    }

    .hg-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: rgba(255,255,255,0.55); font-weight: 500;
    }

    .hg-check {
      width: 18px; height: 18px;
      background: rgba(21,128,61,0.25);
      border: 1px solid rgba(21,128,61,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; color: #4ADE80; flex-shrink: 0;
    }

    /* ── HERO RIGHT — FORM ── */
    .hero-right {
      background: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 40px;
      position: relative;
      z-index: 2;
      box-shadow: -20px 0 60px rgba(0,0,0,0.25);
    }

    .form-header { margin-bottom: 24px; }

    .form-eyebrow {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #B87800; margin-bottom: 6px;
    }

    .form-title { font-size: 1.35rem; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; line-height: 1.2; }

    .form-sub { font-size: 0.84rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    .form-divider { height: 1px; background: var(--border); margin: 20px 0; }

    .form-group { margin-bottom: 14px; }

    .form-label { font-size: 0.78rem; font-weight: 700; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }

    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem; color: var(--text);
      background: var(--bg);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(19,84,200,0.1);
      background: var(--white);
    }

    .form-textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }



    .btn-form {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #FF9500, #FFB800); color: var(--navy);
      border: none; border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 1rem;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(232,168,0,0.30);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }
    .btn-form:hover { background: var(--sun-grad-h); color: var(--navy); transform: translateY(-1px); }

    .form-note {
      font-size: 0.72rem; color: var(--muted);
      text-align: center; margin-top: 10px; line-height: 1.5;
    }

    .form-trust {
      margin-top: 16px;
      background: var(--green-bg);
      border-radius: 8px; padding: 11px 14px;
      display: flex; align-items: center; gap: 9px;
      font-size: 0.8rem; color: var(--green); font-weight: 600;
    }


    /* ── PAIN RECOGNITION ── */
    .pain-section {
      background: var(--white);
      padding: 72px 6%;
      position: relative;
    }

    .pain-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .pain-header .s-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--blue-light); color: var(--blue);
      padding: 5px 13px; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .pain-header h2 { margin-bottom: 10px; }

    .pain-header p {
      font-size: 1rem; color: var(--muted);
      max-width: 480px; margin: 0 auto;
      line-height: 1.6;
    }

    .pain-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .pain-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 24px 22px 20px;
      position: relative;
      transition: all 0.22s;
      cursor: default;
    }

    .pain-card:hover {
      border-color: var(--blue);
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .pain-card.danger:hover { border-color: #E8180C; }
    .pain-card.danger .pain-next { background: #FFF1F0; color: #C00; border-color: rgba(220,0,0,0.15); }
    .pain-card.danger .pain-icon-wrap { background: #FFF1F0; }

    .pain-icon-wrap {
      width: 48px; height: 48px;
      background: var(--blue-light);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .pain-title {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--navy);
      line-height: 1.3;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .pain-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .pain-next {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--blue-light);
      border: 1px solid rgba(26,86,219,0.15);
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--blue);
      line-height: 1.4;
    }

    .pain-next-icon { font-size: 0.9rem; flex-shrink: 0; }

    .pain-cta-center {
      text-align: center;
      padding: 36px 24px;
      background: var(--navy);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .pain-cta-center::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,184,0,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .pain-cta-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .pain-cta-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 22px;
    }

    .pain-cta-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-pain-call {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--sun-grad); color: var(--navy);
      padding: 13px 26px; border-radius: 9px;
      font-weight: 800; font-size: 1rem;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(255,149,0,0.3);
    }
    .btn-pain-call:hover { background: var(--sun-grad-h); color: var(--navy); transform: translateY(-1px); }

    .btn-pain-form {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.85);
      padding: 13px 22px; border-radius: 9px;
      font-weight: 600; font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-pain-form:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.3); }

    @media(max-width:960px) {
      .pain-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media(max-width:640px) {
      .pain-grid { grid-template-columns: 1fr; gap: 12px; }
      .pain-section { padding: 48px 5%; }
      .pain-card { padding: 18px 16px 16px; }
      .pain-cta-center { padding: 28px 16px; }
      .pain-cta-title { font-size: 1.15rem; }
      .pain-cta-btns { flex-direction: column; }
      .btn-pain-call, .btn-pain-form { width: 100%; justify-content: center; }
    }

    /* ── STATS BAND ── */
    .stats-band {
      background: var(--navy2);
      padding: 28px 6%;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
    }

    .stat-item { text-align: center; }

    .stat-num {
      font-size: 2rem; font-weight: 800; color: #fff;
      letter-spacing: -0.03em; line-height: 1;
    }
    .stat-num span { color: var(--sun2); }

    .stat-label { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 4px; font-weight: 500; }

    .stat-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.1); }

    /* ── SERVICES ── */
    .section { padding: 80px 6%; }
    .section-white { background: var(--bg); }
    .section-alt2 { background: var(--bg2); }

    .s-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--blue); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .s-label::before { content: ''; width: 20px; height: 2px; background: var(--blue); }

    h2 {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 800; color: var(--navy);
      letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 12px;
    }

    .s-sub {
      font-size: 1rem; color: var(--text2);
      line-height: 1.7; max-width: 560px; margin-bottom: 48px;
    }

    /* Service tabs */
    .service-tabs {
      display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap;
    }

    .stab {
      padding: 9px 20px; border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .stab:hover { border-color: var(--navy); color: var(--navy); }
    .stab.active { background: var(--blue); color: #fff; border-color: var(--navy); }
    .stab.active.red { background: var(--sun-grad); color: var(--navy); border-color: var(--sun); }

    .service-panel { display: none; }
    .service-panel.active {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      animation: fadeUp 0.35s ease both;
    }

    .sp-content {}

    .sp-tag {
      display: inline-block;
      background: #EBF3FF; color: var(--blue);
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 4px 10px; border-radius: 5px;
      margin-bottom: 14px;
    }
    .sp-tag.blue { background: var(--blue-light); color: var(--blue); }

    .sp-title { font-size: 1.7rem; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; margin-bottom: 12px; line-height: 1.15; }

    .sp-desc { font-size: 0.96rem; color: var(--text2); line-height: 1.7; margin-bottom: 22px; }

    .sp-list { list-style: none; display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }

    .sp-list li {
      display: flex; align-items: flex-start; gap: 9px;
      font-size: 0.88rem; color: var(--text2); line-height: 1.5;
    }

    .sp-list .ck {
      width: 17px; height: 17px;
      background: var(--green-bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem; color: var(--green);
      flex-shrink: 0; margin-top: 2px;
    }

    .btn-sp {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--sun-grad); color: var(--navy);
      padding: 13px 24px; border-radius: 8px;
      font-weight: 700; font-size: 0.9rem;
      text-decoration: none; transition: all 0.2s;
      box-shadow: 0 3px 14px rgba(255,149,0,0.25);
    }
    .btn-sp:hover { background: var(--sun-grad-h); color: var(--navy); transform: translateY(-1px); }
    .btn-sp.blue { background: var(--navy); color: #fff; box-shadow: 0 3px 14px rgba(10,22,40,0.25); }
    .btn-sp.btn-sp.blue:hover { background: var(--navy2); color: #fff; }

    .sp-visual {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 28px;
    }

    .sp-visual-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted); margin-bottom: 18px;
    }

    .sp-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .sp-item {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      display: flex; align-items: center; gap: 11px;
      font-size: 0.86rem; color: var(--text);
    }

    .sp-item-dot { width: 8px; height: 8px; background: var(--sun); border-radius: 50%; flex-shrink: 0; }
    .sp-item-dot.blue { background: var(--blue); }

    .sp-badge {
      display: flex; align-items: center; gap: 9px;
      background: var(--green-bg); border-radius: 8px;
      padding: 12px 14px; font-size: 0.82rem;
      color: var(--green); font-weight: 600;
    }

    /* ── PROCESS ── */
    .process-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      position: relative;
      margin-top: 48px;
    }

    .process-grid::before {
      content: '';
      position: absolute;
      top: 28px; left: 12.5%; right: 12.5%;
      height: 2px;
      background: linear-gradient(90deg, var(--sun), var(--blue));
      z-index: 0;
    }

    .process-step { text-align: center; padding: 0 16px; position: relative; }

    .ps-num {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.3rem;
      margin: 0 auto 18px;
      position: relative; z-index: 1;
      border: 3px solid var(--white);
    }
    .ps-num.r { background: var(--sun-grad); color: var(--navy); }
    .ps-num.b { background: var(--blue); color: #fff; }
    .ps-num.n { background: var(--blue); color: #fff; }
    .ps-num.g { background: var(--green); color: #fff; }

    .ps-title { font-weight: 800; font-size: 0.95rem; color: var(--navy); margin-bottom: 8px; }
    .ps-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

    /* ── TESTIMONIALS ── */
    .testi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

    .testi-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 26px;
      box-shadow: var(--shadow-sm); transition: all 0.25s;
    }
    .testi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }

    .testi-stars { color: #F59E0B; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 13px; }

    .testi-text {
      font-size: 0.93rem; color: var(--text);
      line-height: 1.65; margin-bottom: 18px;
      font-style: italic;
    }

    .testi-author { display: flex; align-items: center; gap: 10px; }

    .testi-av {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--navy2), var(--blue));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.8rem; color: #fff; flex-shrink: 0;
    }

    .testi-name { font-size: 0.84rem; font-weight: 700; color: var(--navy); }
    .testi-loc { font-size: 0.72rem; color: var(--muted); }

    /* ── UPSELL RENO ── */
    .upsell {
      background: var(--navy);
      padding: 80px 6%;
      position: relative; overflow: hidden;
    }

    .upsell::before {
      content: '';
      position: absolute; top: -100px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(26,86,219,0.14) 0%, transparent 65%);
      pointer-events: none;
    }

    .upsell-inner {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: center;
      position: relative; z-index: 1;
    }

    .upsell .s-label { color: var(--sun2); }
    .upsell .s-label::before { background: #FFC020; }
    .upsell h2 { color: #fff; }
    .upsell .s-sub { color: rgba(255,255,255,0.58); margin-bottom: 28px; }

    .upsell-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
    .upsell-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 0.9rem; color: rgba(255,255,255,0.78); line-height: 1.5; }
    .ul-ck { width: 18px; height: 18px; background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #4ADE80; flex-shrink: 0; margin-top: 2px; }

    .btn-upsell {
      display: inline-flex; align-items: center; gap: 9px;
      background: var(--sun-grad); color: var(--navy);
      padding: 14px 28px; border-radius: 10px;
      font-weight: 800; font-size: 0.95rem;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-upsell:hover { background: var(--sun2); color: var(--navy); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,149,0,0.3); }

    .upsell-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    .upsell-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 20px 22px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: all 0.2s;
    }
    .upsell-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); }

    .uc-icon { font-size: 1.7rem; flex-shrink: 0; margin-top: 2px; }

    .uc-title { font-weight: 700; font-size: 0.95rem; color: #fff; margin-bottom: 5px; }
    .uc-desc { font-size: 0.82rem; color: rgba(255,255,255,0.52); line-height: 1.5; }

    .uc-price {
      margin-top: 8px; display: inline-block;
      background: rgba(232,168,0,0.15); color: #93C5FD;
      padding: 3px 10px; border-radius: 5px;
      font-size: 0.74rem; font-weight: 700;
    }

    /* ── CTA FINAL ── */
    .cta-final {
      background: var(--navy);
      padding: 72px 6%;
      text-align: center;
      position: relative; overflow: hidden;
    }

    .cta-final::before {
      content: '⚡';
      position: absolute; font-size: 22rem; opacity: 0.05;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }

    .cf-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800; color: #fff;
      letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 14px;
    }

    .cf-sub { font-size: 1.05rem; color: rgba(255,255,255,0.72); margin-bottom: 34px; }

    .btn-cf {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--sun-grad); color: var(--navy);
      padding: 17px 38px; border-radius: 10px;
      font-weight: 800; font-size: 1.1rem;
      text-decoration: none; transition: all 0.2s;
      box-shadow: 0 6px 28px rgba(0,0,0,0.2);
    }
    .btn-cf:hover { background: var(--sun-grad-h); color: var(--navy); transform: translateY(-2px); }

    .cf-trust {
      display: flex; justify-content: center; gap: 24px;
      flex-wrap: wrap; margin-top: 24px;
    }

    .cf-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.65); }

    /* FOOTER */
    footer {
      background: var(--navy);
      padding: 28px 6%;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .f-left { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
    .f-left strong { color: rgba(255,255,255,0.7); }

    .f-links { display: flex; gap: 18px; }
    .f-links a { font-size: 0.76rem; color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s; }
    .f-links a:hover { color: rgba(255,255,255,0.7); }


    .testi-verified {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #DCFCE7;
      color: #15803D;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 6px;
      letter-spacing: 0.02em;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.85); }
    }

    /* RESPONSIVE */
    /* ── TABLETTE ── */
    @media(max-width:960px) {
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-left { padding: 56px 5% 40px; }
      .hero-right { padding: 36px 5%; box-shadow: 0 -8px 32px rgba(10,22,40,0.15); }
      .hero-photo::after { background: linear-gradient(180deg, rgba(10,24,40,0.88) 0%, rgba(10,24,40,0.75) 60%, rgba(10,24,40,0.55) 100%); }
      .service-panel.active { grid-template-columns: 1fr; gap: 24px; }
      .upsell-inner { grid-template-columns: 1fr; gap: 32px; }
      .process-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
      .process-grid::before { display: none; }
      .testi-grid { grid-template-columns: 1fr; }
      .stats-band { gap: 16px; padding: 24px 5%; }
      .stats-band .stat-divider { display: none; }
      .preuves-grid { grid-template-columns: 1fr; }
      .offre-grid { grid-template-columns: 1fr; }
      nav { padding: 0 4%; }
      .nav-trust { display: none; }
      .nav-links a:not(.btn-nav) { display: none; }
      .section { padding: 60px 5%; }
    }

    /* ── MOBILE ── */
    @media(max-width:640px) {
      .topbar { font-size: 0.72rem; padding: 8px 12px; flex-direction: column; gap: 3px; }
      nav { height: 58px; padding: 0 4%; }
      .nav-avatar { width: 32px; height: 32px; font-size: 0.78rem; }
      .nav-name { font-size: 0.88rem; }
      .nav-role { display: none; }
      .btn-nav { padding: 7px 14px; font-size: 0.78rem !important; }
      .hero-left { padding: 44px 5% 32px; }
      h1 { font-size: clamp(1.9rem, 8vw, 2.6rem); }
      .hero-sub { font-size: 0.95rem; }
      .hero-cta-group { flex-direction: column; gap: 10px; }
      .btn-hero-primary { width: 100%; justify-content: center; font-size: 1rem; padding: 15px 20px; }
      .btn-hero-secondary { width: 100%; justify-content: center; }
      .hero-guarantees { gap: 10px; }
      .hg-item { font-size: 0.78rem; }
      .hero-right { padding: 28px 5%; }
      .form-title { font-size: 1.15rem; }
      .btn-form { font-size: 0.95rem; padding: 14px; }
      .stats-band { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; padding: 24px 5%; }
      .stat-num { font-size: 1.6rem; }
      .stat-label { font-size: 0.7rem; }
      .section { padding: 48px 5%; }
      h2 { font-size: clamp(1.55rem, 6vw, 2rem); }
      .s-sub { font-size: 0.9rem; margin-bottom: 32px; }
      .service-tabs { gap: 6px; }
      .stab { font-size: 0.78rem; padding: 8px 14px; }
      .process-grid { grid-template-columns: 1fr; gap: 24px; }
      .ps-num { width: 46px; height: 46px; font-size: 1.1rem; }
      .testi-card { padding: 20px; }
      .upsell { padding: 48px 5%; }
      .upsell-cards { gap: 10px; }
      .upsell-card { padding: 16px 18px; }
      .btn-upsell { width: 100%; justify-content: center; }
      .lm-wrap { padding: 36px 5%; border-radius: 16px; margin: 0 4% 60px; }
      .lm-title { font-size: 1.35rem; }
      .cta-final { padding: 48px 5%; }
      .cf-title { font-size: clamp(1.6rem, 6vw, 2.2rem); }
      .btn-cf { width: 100%; justify-content: center; padding: 15px 20px; font-size: 1rem; }
      .cf-trust { gap: 12px; }
      footer { flex-direction: column; text-align: center; padding: 24px 5%; gap: 14px; }
      .f-links { justify-content: center; }

      /* Urgency bar — 1 seule ligne */
      .urgency-bar { flex-wrap: nowrap; }
      .ub-hide-mobile { display: none; }
      .ub-text { font-size: 0.7rem; white-space: nowrap; }
      .ub-phone { font-size: 1rem; }

      /* Nav — empêcher débordement bouton */
      .nav-brand { min-width: 0; flex: 1; overflow: hidden; }
      .nav-name { font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .btn-nav { white-space: nowrap; flex-shrink: 0; padding: 8px 12px; font-size: 0.76rem !important; }

      /* Boutons service full width mobile */
      .btn-sp { width: 100%; justify-content: center; }

      /* CTA final titre — pas d'orphelin */
      .cf-title { font-size: clamp(1.5rem, 5.5vw, 2rem); }
      .cta-final { padding: 44px 5%; }

      /* Pain section CTA block */
      .pain-cta-center { padding: 26px 16px; border-radius: 12px; }
    }

    @media(max-width:380px) {
      h1 { font-size: 1.75rem; }
      .btn-hero-primary { font-size: 0.88rem; padding: 14px 16px; }
      .stats-band { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .pain-cta-title { font-size: 1rem; }
      .hero-ctas { gap: 8px; }
      .nav-brand { gap: 6px; }
      .nav-name { font-size: 0.78rem; }
      .btn-nav { padding: 6px 10px; font-size: 0.72rem !important; }
      .ub-phone { font-size: 0.95rem; }
      .ub-text { font-size: 0.66rem; }
      .lm-chips { display: none; }
      .pain-grid { gap: 10px; }
      .cf-title { font-size: 1.4rem; }
    }
  @media(max-width:640px) {
    .mobile-cta { display: block; }
    body { padding-bottom: 58px; }
  }
